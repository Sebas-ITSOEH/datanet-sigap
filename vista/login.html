<div class="login-wrapper">
    <div class="login-container">
        
        <div class="login-side">
            <div class="brand">
                <span class="brand-icon">🏫</span>
                <span class="brand-name">Benito Juárez</span>
            </div>

            <h2>Bienvenido de nuevo</h2>
            <p class="subtitle">Ingresa tus credenciales para acceder al sistema</p>

            <form id="loginForm">
                <div class="input-box">
                    <label>Correo</label>
                    <input type="email" id="user" placeholder="correo@dominio.com" required>
                </div>

                <div class="input-box">
                    <label>Contraseña</label>
                    <input type="password" id="pass" placeholder="••••••••" required minlength="8" maxlength="15">
                </div>

                <div class="input-box">
                    <label>Rol de Acceso</label>
                    <select id="rol" required>
                        <option value="" disabled selected>Selecciona tu rol</option>
                        <option value="Alumno">Alumno</option>
                        <option value="Profesor">Profesor</option>
                        <option value="Padre de familia">Padre de familia</option>
                        <option value="Prefectura">Prefectura</option>
                    </select>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Recordarme
                    </label>
                    <a href="#" class="forgot-pass">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-login">Entrar</button>
                    <button type="button" class="btn-register" data-vista="registro">Registrarse</button>
                </div>
            </form>
        </div>

        <div class="info-side">
            <div class="info-content">
                <div class="illustration">
                    <div class="circle-decoration"></div>
                    <span class="edu-icon">🎓</span>
                </div>
                <h3>Plataforma Escolar</h3>
                <p>Gestión académica eficiente para nuestra comunidad estudiantil.</p>
            </div>
        </div>

    </div>
</div>
